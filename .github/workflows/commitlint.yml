name: Conventional Commit PR Title

# Enforces a Conventional-Commit PR title on THIS repo by DOGFOODING its own reusable workflow (`uses: ./…`). A
# change that breaks the check breaks this repo's own PRs first — the earliest possible signal, exactly as
# release.yml dogfoods the release reusable.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  title:
    # The caller grants the token scope; the reusable consumes GITHUB_TOKEN automatically. This workflow's name +
    # job id `title` form this repo's required check — full name in commitlint-reusable.yml's NOTE.
    permissions:
      pull-requests: read
    uses: ./.github/workflows/commitlint-reusable.yml
