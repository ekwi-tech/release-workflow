name: Semantic PR Title

# Enforces a Conventional-Commit PR title on THIS repo by DOGFOODING its own reusable workflow (`uses: ./…`). A
# change that breaks the check breaks this repo's own PRs first — the earliest possible signal, exactly as
# release.yml dogfoods the release reusable.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  title:
    # The caller grants the token scope; the reusable consumes GITHUB_TOKEN, passed automatically. The resulting
    # check is "title / validate-pr-title" — this is the name to require in the ruleset.
    permissions:
      pull-requests: read
    uses: ./.github/workflows/commitlint-reusable.yml
