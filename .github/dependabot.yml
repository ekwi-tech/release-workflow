version: 2

# Without this file the "pinned by SHA, bumped by Dependabot" contract has nothing behind it — the SHA pins
# (next-version-action and release-notes-action, plus checkout / actionlint / the PR-title linter) freeze and
# rot. directory "/" scans the workflows here.
#
# assignees is ekwi-bot (the PR is owned by automation; Dependabot honours assignees only for write-access
# accounts). Who REVIEWS is CODEOWNERS' job — GitHub removed dependabot.yml's reviewers: option on 2025-08-08.
#
# NO ignore here: the dependency on the two actions is one-way (they do not use this workflow), so there is no
# cycle to break. Watching them IS the controlled rollout — a bump lands here, ships as a new release-workflow
# tag, and consumers adopt it through their own Dependabot PR.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    assignees:
      - ekwi-bot
    commit-message:
      prefix: ci          # Conventional Commits type — commitlint.yml accepts it
    groups:
      actions-all:
        patterns:
          - "*"
