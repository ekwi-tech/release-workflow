version: 2

# Without this file the "pinned by SHA, bumped by Dependabot" contract has nothing behind it — the SHA pins
# (next-version-action and release-notes-action, plus checkout / actionlint / the PR-title linter) freeze and
# rot. directory "/" scans the workflows here.
#
# assignees is ekwi-bot (the PR is owned by automation; Dependabot honours assignees only for write-access
# accounts). Who REVIEWS is CODEOWNERS' job — GitHub removed dependabot.yml's reviewers: option on 2025-08-08.
#
# NO ignore here — but the reason is no longer "one-way". next-version-action and release-notes-action now DO
# consume this repo (their commitlint.yml calls commitlint-reusable), while this repo pins them: a cycle. It is
# broken on THEIR side — each ignores ekwi-tech/release-workflow in its own dependabot.yml — so watching them
# here stays a one-way controlled rollout: a bump lands here, ships as a new tag, consumers adopt it via their PR.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    assignees:
      - ekwi-bot
    commit-message:
      prefix: ci          # Conventional Commits type — commitlint.yml accepts it
    groups:
      actions-all:
        patterns:
          - "*"
